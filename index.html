<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>For My Rasmalai 💕</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100dvh;
      background: radial-gradient(circle at 35% 25%, #0f1e4e 0%, #0a1638 40%, #050c22 100%);
      color: #e0f0ff;
      font-family: system-ui, -apple-system, sans-serif;
      overflow: hidden;
      position: relative;
    }

    /* Floating flower-like blobs */
    .flower {
      position: absolute;
      border-radius: 50%;
      background: linear-gradient(135deg, rgba(255, 182, 193, 0.7), rgba(255, 105, 180, 0.4), transparent);
      pointer-events: none;
      filter: blur(12px);
      animation: float 18s infinite ease-in-out;
    }

    .flower:nth-child(1) {
      width: 180px;
      height: 180px;
      top: 8%;
      left: 12%;
      animation-delay: 0s;
      opacity: 0.6;
    }

    .flower:nth-child(2) {
      width: 140px;
      height: 140px;
      top: 22%;
      right: 15%;
      animation-delay: 4s;
      opacity: 0.5;
    }

    .flower:nth-child(3) {
      width: 220px;
      height: 220px;
      bottom: 15%;
      left: 8%;
      animation-delay: 7s;
      opacity: 0.45;
    }

    .flower:nth-child(4) {
      width: 160px;
      height: 160px;
      bottom: 28%;
      right: 10%;
      animation-delay: 11s;
      opacity: 0.55;
    }

    .flower:nth-child(5) {
      width: 110px;
      height: 110px;
      top: 45%;
      left: 55%;
      animation-delay: 14s;
      opacity: 0.65;
    }

    @keyframes float {

      0%,
      100% {
        transform: translate(0, 0) rotate(0deg);
      }

      25% {
        transform: translate(30px, -40px) rotate(8deg);
      }

      50% {
        transform: translate(-20px, 50px) rotate(-6deg);
      }

      75% {
        transform: translate(40px, 20px) rotate(10deg);
      }
    }

    main {
      position: relative;
      z-index: 10;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 4vw 6vw;
      text-align: center;
    }

    h1 {
      font-size: clamp(2.1rem, 9vw, 5.8rem);
      font-weight: 800;
      background: linear-gradient(90deg, #ff9ec1, #c7eaff, #a5d8ff, #ff9ec1);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow:
        0 0 20px rgba(180, 220, 255, 0.9),
        0 0 40px rgba(255, 180, 200, 0.7),
        0 0 70px rgba(200, 220, 255, 0.5);
      letter-spacing: -1px;
      line-height: 0.92;
      margin-bottom: 0.8em;
      animation: glow 3.5s ease-in-out infinite alternate;
    }

    p {
      font-size: clamp(1.1rem, 5.5vw, 1.9rem);
      opacity: 0.92;
      line-height: 1.4;
      max-width: 38ch;
      text-shadow: 0 2px 12px rgba(0, 0, 0, 0.6);
    }

    .heart {
      display: inline-block;
      color: #ff85b2;
      font-size: 1.4em;
      margin: 0 0.15em;
      animation: beat 1.4s infinite;
    }

    @keyframes glow {
      from {
        text-shadow: 0 0 18px #a5d8ff88, 0 0 36px #ff9ec188, 0 0 60px #a5d8ff44;
      }

      to {
        text-shadow: 0 0 30px #c7eaffcc, 0 0 60px #ff9ec1aa, 0 0 100px #c7eaff66;
      }
    }

    @keyframes beat {

      0%,
      100% {
        transform: scale(1);
      }

      50% {
        transform: scale(1.35);
      }
    }

    @media (orientation: landscape) {
      h1 {
        font-size: clamp(3.2rem, 8vh, 7rem);
      }

      p {
        font-size: clamp(1.3rem, 4vh, 2.2rem);
      }
    }
  </style>
</head>

<body>

  <div class="flower"></div>
  <div class="flower"></div>
  <div class="flower"></div>
  <div class="flower"></div>
  <div class="flower"></div>

  <main>
    <h1>I LOVE YOU<br>A LOT<br>MY RASMALAI</h1>
    <p>
      Nothing beside you is my priority<br>
      You're the best partner of mine<br>
      for life<span class="heart">💗</span>
    </p>
  </main>

</body>

</html>
